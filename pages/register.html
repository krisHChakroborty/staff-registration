<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee Registration</title>

<style>
body{background:#0b0b0f;color:#fff;font-family:Poppins;padding:30px}
form{max-width:500px;margin:auto;background:#14141b;padding:20px;border-radius:12px}
input,select,textarea{
  width:100%;padding:10px;margin:8px 0;
  background:#111;border:1px solid #333;color:#fff;border-radius:8px;
}
button{width:100%;padding:12px;background:#ffcc00;border:none;font-weight:bold;cursor:pointer}
a{color:#ffcc00;display:block;text-align:center;margin-top:10px}
</style>
</head>

<body>

<h2 style="text-align:center;color:#ffcc00">Employee Registration</h2>

<form id="registerForm">

<input id="fullName" placeholder="Full Name" required />
<input id="email" placeholder="Email"/>
<input id="mobile" placeholder="Mobile" required/>
<input id="emergencyContact" placeholder="Emergency Contact"/>
<textarea id="address" placeholder="Address"></textarea>

<input id="designation" placeholder="Designation" required/>

<select id="experienceType">
  <option>Fresher</option>
  <option>Experienced</option>
</select>

<input id="outletName" placeholder="Outlet Name"/>
<input id="salary" type="number" placeholder="Salary"/>

<label>Joining Date</label>
<input id="joiningDate" type="date" required/>

<button type="submit">Save Employee</button>

<p id="message"></p>

</form>

<a href="../index.html">⬅ Back to Home</a>

<script type="module">
import { db } from "../firebase-config.js";
import { collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const form = document.getElementById("registerForm");
const msg = document.getElementById("message");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  try{
    await addDoc(collection(db,"employees"),{
      fullName: fullName.value,
      email: email.value,
      mobile: mobile.value,
      emergencyContact: emergencyContact.value,
      address: address.value,
      designation: designation.value,
      experienceType: experienceType.value,
      outletName: outletName.value,
      salary: Number(salary.value || 0),
      joiningDate: joiningDate.value,
      createdAt: serverTimestamp()
    });

    msg.style.color="lightgreen";
    msg.textContent="Saved Successfully!";
    form.reset();

  }catch(err){
    msg.style.color="red";
    msg.textContent=err.message;
  }
});
</script>

</body>
</html>
