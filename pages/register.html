<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Employee - FirstWave Fries</title>

  <link rel="stylesheet" href="../css/register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="register-page">
    <div class="register-card">

      <div class="top-bar">
        <img src="../assets/logo.png" alt="FirstWave Fries Logo" class="brand-logo">
        <div class="brand-text">
          <h1>FirstWave Fries</h1>
          <p>New Employee Registration</p>
        </div>
      </div>

      <form id="registerForm" class="register-form">
        <div class="form-grid">

          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter full name" required>
          </div>

          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" placeholder="Enter mobile number" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email address">
          </div>

          <div class="form-group">
            <label for="emergencyContact">Emergency Contact Number</label>
            <input type="tel" id="emergencyContact" placeholder="Enter emergency contact number">
          </div>

          <div class="form-group full-width">
            <label for="address">Address</label>
            <textarea id="address" rows="3" placeholder="Enter employee address"></textarea>
          </div>

          <div class="form-group">
            <label for="designation">Designation</label>
            <input type="text" id="designation" placeholder="e.g. Crew, Captain, Cashier" required>
          </div>

          <div class="form-group">
            <label for="experienceType">Experience Type</label>
            <select id="experienceType" required>
              <option value="">Select experience type</option>
              <option value="Fresher">Fresher</option>
              <option value="Experienced">Experienced</option>
            </select>
          </div>

          <div class="form-group">
            <label for="outletName">Outlet Name</label>
            <input type="text" id="outletName" placeholder="Enter outlet name">
          </div>

          <div class="form-group">
            <label for="salary">Salary</label>
            <input type="number" id="salary" placeholder="Enter salary">
          </div>

          <div class="form-group">
            <label for="idType">ID Type</label>
            <select id="idType">
              <option value="">Select ID type</option>
              <option value="Aadhaar">Aadhaar</option>
              <option value="PAN">PAN</option>
              <option value="Voter ID">Voter ID</option>
              <option value="Driving License">Driving License</option>
              <option value="Passport">Passport</option>
            </select>
          </div>

          <div class="form-group">
            <label for="idNumber">ID Number</label>
            <input type="text" id="idNumber" placeholder="Enter ID number">
          </div>

        </div>

        <div class="form-actions">
          <button type="submit" class="register-btn">Register Employee</button>
          <a href="../index.html" class="back-link">← Back to Home</a>
        </div>

        <p id="message" class="message"></p>
      </form>
    </div>
  </div>

  <script type="module" src="../js/register.js"></script>
</body>
</html>
